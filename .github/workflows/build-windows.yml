name: Build Claude Island Windows (Electron)

on:
  push:
    branches: [ main ]
    paths:
      - 'windows/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Get build info
        id: info
        shell: pwsh
        run: |
          $sha = git rev-parse --short HEAD
          $date = (Get-Date -AsUTC -Format "yyyy-MM-dd HH:mm") + " UTC"
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "date=$date" >> $env:GITHUB_OUTPUT

      - name: Find installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in dist/"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeIsland-Windows-Setup
          path: ${{ steps.installer.outputs.path }}
          retention-days: 30

      - name: Publish windows-latest-build release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $sha = "${{ steps.info.outputs.sha }}"
          $exePath = "${{ steps.installer.outputs.path }}"
          gh release delete windows-latest-build --yes 2>$null
          git push origin --delete windows-latest-build 2>$null
          git tag -f windows-latest-build
          git push origin windows-latest-build --force
          gh release create windows-latest-build $exePath --title "Windows Latest Build ($sha)" --notes "Commit: $sha" --prerelease
