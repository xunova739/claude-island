name: Build Claude Island

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild \
            -scheme ClaudeIsland \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          APP_PATH=$(find build -name "Claude Island.app" | head -1)
          mkdir -p dist
          hdiutil create -volname "Claude Island" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            dist/ClaudeIsland-focused-notch.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeIsland-focused-notch
          path: dist/ClaudeIsland-focused-notch.dmg
          retention-days: 30
